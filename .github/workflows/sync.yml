name: Sync Google Drive

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:           # permite ejecutar manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write service account credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials/service_account.json

      - name: Run sync
        run: node worker/sync-once.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ./credentials/service_account.json
          ANIO_PLANILLA: 2026
          NODE_ENV: production
